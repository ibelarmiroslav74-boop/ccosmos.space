<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Энциклопедия космоса - CCosmos</title>
    <meta name="description" content="Каталог космических объектов: от планет Солнечной системы до далеких туманностей в 3D.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="25" fill="none" stroke="#00ffff" stroke-width="4" />
                <ellipse cx="50" cy="50" rx="45" ry="10" fill="none" stroke="#8a2be2" stroke-width="3" transform="rotate(-25 50 50)" />
                <circle cx="50" cy="50" r="15" fill="#fff" />
            </svg>
            <span>CCOSMOS</span>
        </a>
        <button class="menu-toggle" type="button" aria-label="Открыть меню" aria-expanded="false" aria-controls="main-nav">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="main-nav">
            <a href="encyclopedia.html" style="color: var(--accent-glow);">Энциклопедия</a>
        </nav>
    </header>

    <main style="padding: 40px 5%;">
        <h2 style="font-family: 'Orbitron', sans-serif; font-size: 2rem; margin-bottom: 20px;">Каталог объектов</h2>
        <p style="color: var(--text-muted); margin-bottom: 40px;">Выберите небесное тело, чтобы открыть его детальное 3D описание.</p>

        <div class="catalog-grid">
            <a href="article-mars.html" class="card">
                <h3>Марс</h3>
                <p>Четвертая планета от Солнца. Пыльный, холодный мир с очень разреженной атмосферой.</p>
            </a>

            <a href="#" class="card" style="opacity: 0.7;">
                <h3>Земля (Скоро)</h3>
                <p>Наш родной дом. Единственная известная планета во Вселенной, на которой есть жизнь.</p>
            </a>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const header = document.querySelector('header');
        const menuToggle = document.querySelector('.menu-toggle');

        menuToggle.addEventListener('click', () => {
            const isOpen = header.classList.toggle('menu-open');
            menuToggle.setAttribute('aria-expanded', String(isOpen));
        });

        fetch('footer.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('footer-placeholder').outerHTML = html;
            });
    </script>

</body>
</html>
